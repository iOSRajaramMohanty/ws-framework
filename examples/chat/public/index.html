<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WS Framework — Chat demo</title>
    <style>
      :root {
        font-family: system-ui, sans-serif;
        background: #0f1419;
        color: #e7e9ea;
      }
      body {
        max-width: 40rem;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      h1 {
        font-size: 1.25rem;
        font-weight: 600;
      }
      #join {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
        margin-bottom: 1rem;
      }
      #join input {
        flex: 1;
        min-width: 12rem;
        padding: 0.5rem 0.75rem;
        border-radius: 6px;
        border: 1px solid #38444d;
        background: #15202b;
        color: inherit;
      }
      button {
        padding: 0.5rem 1rem;
        border-radius: 6px;
        border: none;
        background: #1d9bf0;
        color: #fff;
        font-weight: 600;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      #log {
        border: 1px solid #38444d;
        border-radius: 8px;
        height: 20rem;
        overflow-y: auto;
        padding: 0.75rem;
        background: #15202b;
        font-size: 0.9rem;
        line-height: 1.45;
      }
      .msg {
        margin-bottom: 0.5rem;
      }
      .msg .meta {
        color: #8b98a5;
        font-size: 0.8rem;
      }
      .msg .body strong {
        color: #1d9bf0;
      }
      #compose {
        display: flex;
        gap: 0.5rem;
        margin-top: 0.75rem;
      }
      #compose input {
        flex: 1;
        padding: 0.5rem 0.75rem;
        border-radius: 6px;
        border: 1px solid #38444d;
        background: #15202b;
        color: inherit;
      }
      .error {
        color: #f4212e;
      }
      .system {
        color: #8899a6;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <h1>Chat (demo)</h1>
    <p style="color: #8899a6; font-size: 0.9rem">
      Enter a nickname, join, then open this page in another tab to see messages broadcast to everyone.
    </p>
    <div id="join">
      <input id="nick" type="text" placeholder="Nickname" maxlength="32" autocomplete="username" />
      <button type="button" id="btnJoin">Join room</button>
    </div>
    <div id="log" aria-live="polite"></div>
    <div id="compose" hidden>
      <input id="line" type="text" placeholder="Type a message…" maxlength="2000" autocomplete="off" />
      <button type="button" id="btnSend">Send</button>
    </div>

    <script type="module">
      const logEl = document.getElementById("log");
      const nickEl = document.getElementById("nick");
      const btnJoin = document.getElementById("btnJoin");
      const compose = document.getElementById("compose");
      const lineEl = document.getElementById("line");
      const btnSend = document.getElementById("btnSend");

      /** @type {WebSocket | null} */
      let ws = null;
      /** @type {string | null} */
      let myNickname = null;

      function append(html, className) {
        const div = document.createElement("div");
        div.className = "msg" + (className ? " " + className : "");
        div.innerHTML = html;
        logEl.appendChild(div);
        logEl.scrollTop = logEl.scrollHeight;
      }

      function connect() {
        const proto = location.protocol === "https:" ? "wss:" : "ws:";
        return new WebSocket(`${proto}//${location.host}`);
      }

      function send(event, data) {
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ event, data }));
        }
      }

      btnJoin.addEventListener("click", () => {
        const nickname = nickEl.value.trim();
        if (!nickname) {
          append('<span class="error">Enter a nickname.</span>', "error");
          return;
        }
        if (ws) {
          ws.close();
        }
        ws = connect();
        ws.onopen = () => {
          send("chat_join", { nickname });
        };
        ws.onmessage = (ev) => {
          try {
            const msg = JSON.parse(ev.data);
            const { event, data } = msg;
            if (event === "chat_welcome") {
              myNickname = data.nickname;
              append(
                `<div class="meta">Welcome, <strong>${escapeHtml(data.nickname)}</strong>. Others online: ${(data.online || []).map(escapeHtml).join(", ") || "(none)"}</div>`,
              );
              compose.hidden = false;
              nickEl.disabled = true;
              btnJoin.disabled = true;
              lineEl.focus();
            } else if (event === "chat_presence") {
              if (data.kind === "joined" && data.nickname === myNickname) {
                return;
              }
              const verb = data.kind === "joined" ? "joined" : "left";
              append(`<div class="system">${escapeHtml(data.nickname)} ${verb} the room.</div>`, "system");
            } else if (event === "chat_message") {
              const t = data.at ? new Date(data.at).toLocaleTimeString() : "";
              append(
                `<div class="meta">${escapeHtml(t)}</div><div class="body"><strong>${escapeHtml(data.from)}</strong> ${escapeHtml(data.text)}</div>`,
              );
            } else if (event === "chat_error") {
              append(`<span class="error">${escapeHtml(data.message || "Error")}</span>`, "error");
            }
          } catch {
            append('<span class="error">Invalid message from server.</span>', "error");
          }
        };
        ws.onclose = () => {
          append('<div class="system">Disconnected.</div>', "system");
          myNickname = null;
          compose.hidden = true;
          nickEl.disabled = false;
          btnJoin.disabled = false;
        };
        ws.onerror = () => {
          append('<span class="error">WebSocket error.</span>', "error");
        };
      });

      btnSend.addEventListener("click", () => {
        const text = lineEl.value.trim();
        if (!text) return;
        send("chat_message", { text });
        lineEl.value = "";
      });

      lineEl.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          btnSend.click();
        }
      });

      function escapeHtml(s) {
        if (typeof s !== "string") return "";
        return s
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }
    </script>
  </body>
</html>
